## Nginx config untuk lk21official.eu.cc
## Copy file ini ke /etc/nginx/sites-available/lk21official
## Lalu: sudo ln -s /etc/nginx/sites-available/lk21official /etc/nginx/sites-enabled/
## Lalu: sudo nginx -t && sudo systemctl reload nginx
## Lalu: sudo certbot --nginx -d lk21official.eu.cc

server {
    listen 80;
    listen [::]:80;
    server_name lk21official.eu.cc;

    # Redirect HTTP ke HTTPS (certbot akan handle ini nanti)
    # location / {
    #     return 301 https://$server_name$request_uri;
    # }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';

        # Forward real client info
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffer settings
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 4 16k;
    }

    # Static assets caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Max upload size
    client_max_body_size 5M;
}
